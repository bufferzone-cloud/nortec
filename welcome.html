<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Northern Technical College</title>
    <!-- Professional Icons (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* ── RESET & BASE ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e17;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 12px;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── SMALLER PHONE FRAME ── */
        .phone-frame {
            width: 100%;
            max-width: 380px;
            height: 700px;
            max-height: 90vh;
            max-height: 90dvh;
            border-radius: 36px;
            overflow: hidden;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.6),
                0 0 0 2px rgba(255, 255, 255, 0.05) inset;
            background: #000;
            position: relative;
            transition: height 0.3s ease;
        }

        /* ── BACKGROUND WITH REDUCED TRANSPARENCY ── */
        .bg-layer {
            position: absolute;
            inset: 0;
            background-image: url('home.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .bg-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            /* Reduced dark overlay – much lighter */
            background: linear-gradient(180deg,
                    rgba(0, 0, 0, 0.20) 0%,
                    rgba(0, 0, 0, 0.35) 40%,
                    rgba(0, 0, 0, 0.55) 100%);
            backdrop-filter: blur(0.5px);
            -webkit-backdrop-filter: blur(0.5px);
        }

        /* ── SCROLLABLE CONTENT ── */
        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 32px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .content::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }

        /* ── LOGO (now using logo.png) ── */
        .logo-wrapper {
            margin-top: 8px;
            margin-bottom: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        /* ── TITLE (smaller) ── */
        .title {
            text-align: center;
            margin: 6px 0 18px;
            flex-shrink: 0;
        }

        .title h1 {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0.3px;
            line-height: 1.3;
            color: #fff;
            text-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            word-break: break-word;
        }

        .title h1 .accent {
            color: #6cffa0;
        }

        .title .sub {
            font-size: 10px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* ── SPACER ── */
        .spacer {
            flex: 1;
            min-height: 10px;
        }

        /* ── BUTTONS (smaller, with icons) ── */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 280px;
            flex-shrink: 0;
            padding-bottom: 4px;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.2px;
            color: #fff;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
            min-height: 48px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, transparent 60%);
            pointer-events: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Green — Enroll */
        .btn-enroll {
            background: linear-gradient(135deg, #00c853, #009e3d);
            box-shadow: 0 6px 24px rgba(0, 200, 83, 0.35);
        }
        .btn-enroll:hover {
            box-shadow: 0 10px 32px rgba(0, 200, 83, 0.45);
            transform: translateY(-1px);
        }

        /* Blue — Login */
        .btn-login {
            background: linear-gradient(135deg, #2979ff, #0d47a1);
            box-shadow: 0 6px 24px rgba(41, 121, 255, 0.35);
        }
        .btn-login:hover {
            box-shadow: 0 10px 32px rgba(41, 121, 255, 0.45);
            transform: translateY(-1px);
        }

        .btn i {
            margin-right: 10px;
            font-size: 16px;
            color: #fff;
        }

        /* ── FOOTER ── */
        .footer-note {
            margin-top: 12px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        /* ── MODAL OVERLAY ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            touch-action: none;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* ── MODAL BOX (smaller) ── */
        .modal {
            background: rgba(16, 22, 38, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 24px 20px 20px;
            max-width: 340px;
            width: 100%;
            max-height: 85vh;
            max-height: 85dvh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            transform: scale(0.92) translateY(16px);
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
            opacity: 0;
            position: relative;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal::-webkit-scrollbar {
            width: 3px;
        }
        .modal::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
        }

        /* ── MODAL CLOSE ── */
        .modal-close {
            position: absolute;
            top: 12px;
            right: 14px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            touch-action: manipulation;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        /* ── MODAL HEADER (distinct CSS per form) ── */
        .modal-header {
            text-align: center;
            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .modal-header .modal-title {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.2px;
        }

        .modal-header .modal-title i {
            margin-right: 8px;
        }

        /* Enroll modal header accent */
        .modal-enroll .modal-header {
            border-top: 5px solid #00c853;
            border-radius: 0 0 0 0;
        }
        .modal-enroll .modal-title i {
            color: #00c853;
        }

        /* Login modal header accent */
        .modal-login .modal-header {
            border-top: 5px solid #2979ff;
            border-radius: 0 0 0 0;
        }
        .modal-login .modal-title i {
            color: #2979ff;
        }

        /* ── FORM ELEMENTS (smaller) ── */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
            letter-spacing: 0.2px;
        }

        .form-select,
        .form-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s ease;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .form-select option {
            background: #141e30;
            color: #fff;
        }

        .form-select:focus,
        .form-input:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.03);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #141e30 inset;
            -webkit-text-fill-color: #fff;
        }

        /* ── PASSWORD WRAPPER ── */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            touch-action: manipulation;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        /* ── CHECKBOX & LINKS ── */
        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin: 6px 0 14px;
        }

        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .checkbox-wrap input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #2979ff;
            cursor: pointer;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .forgot-link {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            text-decoration: none;
            transition: color 0.2s;
            touch-action: manipulation;
        }

        .forgot-link:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        /* ── SUBMIT BUTTONS (form-specific CSS) ── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.25s ease;
            touch-action: manipulation;
            margin-top: 4px;
            letter-spacing: 0.2px;
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        /* Enroll submit – green */
        .btn-submit-enroll {
            background: linear-gradient(135deg, #00c853, #009e3d);
            box-shadow: 0 6px 24px rgba(0, 200, 83, 0.3);
        }
        .btn-submit-enroll:hover {
            box-shadow: 0 10px 32px rgba(0, 200, 83, 0.4);
            transform: translateY(-1px);
        }

        /* Login submit – blue */
        .btn-submit-login {
            background: linear-gradient(135deg, #2979ff, #0d47a1);
            box-shadow: 0 6px 24px rgba(41, 121, 255, 0.3);
        }
        .btn-submit-login:hover {
            box-shadow: 0 10px 32px rgba(41, 121, 255, 0.4);
            transform: translateY(-1px);
        }

        /* ── SUPPORT LINK ── */
        .support-link {
            text-align: center;
            margin-top: 14px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }

        .support-link a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .support-link a:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        /* ── RESPONSIVE TWEAKS ── */
        @media (max-width: 400px) {
            .phone-frame {
                max-width: 100%;
                height: 100vh;
                height: 100dvh;
                border-radius: 0;
                box-shadow: none;
            }
            .content {
                padding: 24px 16px 16px;
            }
            .logo {
                width: 70px;
                height: 70px;
            }
            .title h1 {
                font-size: 16px;
            }
            .btn {
                font-size: 14px;
                padding: 12px 16px;
                min-height: 44px;
            }
            .modal {
                padding: 20px 16px 16px;
                border-radius: 28px;
            }
            .modal-header .modal-title {
                font-size: 18px;
            }
        }

        @media (min-height: 800px) {
            .phone-frame {
                height: 760px;
            }
            .logo {
                width: 90px;
                height: 90px;
            }
            .title h1 {
                font-size: 20px;
            }
        }

        /* ── SAFE AREA ── */
        @supports (padding: env(safe-area-inset-top)) {
            .content {
                padding-left: calc(20px + env(safe-area-inset-left));
                padding-right: calc(20px + env(safe-area-inset-right));
                padding-top: calc(32px + env(safe-area-inset-top));
                padding-bottom: calc(20px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

    <!-- ─── PHONE FRAME ─── -->
    <div class="phone-frame" role="main" aria-label="Northern Technical College app">

        <!-- Background -->
        <div class="bg-layer" aria-hidden="true"></div>

        <!-- Content -->
        <div class="content">

            <!-- Logo (now an image) -->
            <div class="logo-wrapper">
                <img src="logo.png" class="logo" alt="Northern Technical College Logo" />
            </div>

            <!-- Title -->
            <div class="title">
                <h1>
                    WELCOME TO<br />
                    <span class="accent">NORTHERN</span> TECHNICAL COLLEGE
                </h1>
                <div class="sub">Excellence in Technical Education</div>
            </div>

            <!-- Spacer -->
            <div class="spacer"></div>

            <!-- Buttons with professional icons -->
            <div class="button-group">
                <button class="btn btn-enroll" id="enrollBtn" aria-label="Enroll now">
                    <i class="fas fa-graduation-cap"></i> Enroll
                </button>
                <button class="btn btn-login" id="loginBtn" aria-label="Login to your account">
                    <i class="fas fa-lock"></i> Login
                </button>
            </div>

            <!-- Footer -->
            <div class="footer-note">© 2026 Northern Technical College</div>
        </div>
    </div>

    <!-- ─── ENROLL MODAL (with green accent) ─── -->
    <div class="modal-overlay" id="enrollModal" role="dialog" aria-modal="true" aria-labelledby="enrollTitle">
        <div class="modal modal-enroll">
            <button class="modal-close" id="enrollClose" aria-label="Close enrollment form">&times;</button>
            <div class="modal-header">
                <div class="modal-title" id="enrollTitle">
                    <i class="fas fa-graduation-cap"></i> Enroll Now
                </div>
            </div>

            <form id="enrollForm" novalidate>
                <div class="form-group">
                    <label for="programSelect">Choose your programme</label>
                    <select class="form-select" id="programSelect" required>
                        <option value="" disabled selected>Select a programme</option>
                        <option value="Craft Certificate Programmes">Craft Certificate Programmes</option>
                        <option value="Trade Certificate Programmes">Trade Certificate Programmes</option>
                        <option value="Advanced Certificate Programmes">Advanced Certificate Programmes</option>
                        <option value="Diploma Programmes">Diploma Programmes</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit btn-submit-enroll">
                    Continue Enrollment <i class="fas fa-arrow-right" style="margin-left:8px;"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ─── LOGIN MODAL (with blue accent) ─── -->
    <div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
        <div class="modal modal-login">
            <button class="modal-close" id="loginClose" aria-label="Close login form">&times;</button>
            <div class="modal-header">
                <div class="modal-title" id="loginTitle">
                    <i class="fas fa-sign-in-alt"></i> Login
                </div>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username">Student ID / Username</label>
                    <input class="form-input" type="text" id="username" placeholder="Enter your ID or username" required />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input class="form-input" type="password" id="password" placeholder="••••••••" required />
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <div class="form-row">
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="rememberMe" />
                        Remember me
                    </label>
                    <a href="#" class="forgot-link" id="forgotLink">Forgot your Password?</a>
                </div>

                <button type="submit" class="btn-submit btn-submit-login">
                    Sign In <i class="fas fa-arrow-right" style="margin-left:8px;"></i>
                </button>

                <div class="support-link">
                    Need help? <a href="#" id="supportLink">Contact Support</a>
                </div>
            </form>
        </div>
    </div>

    <!-- ─── JAVASCRIPT ─── -->
    <script>
        (function() {
            'use strict';

            // ── DOM refs ──
            const enrollBtn = document.getElementById('enrollBtn');
            const loginBtn = document.getElementById('loginBtn');
            const enrollModal = document.getElementById('enrollModal');
            const loginModal = document.getElementById('loginModal');
            const enrollClose = document.getElementById('enrollClose');
            const loginClose = document.getElementById('loginClose');
            const enrollForm = document.getElementById('enrollForm');
            const loginForm = document.getElementById('loginForm');
            const passwordToggle = document.getElementById('passwordToggle');
            const passwordInput = document.getElementById('password');
            const forgotLink = document.getElementById('forgotLink');
            const supportLink = document.getElementById('supportLink');

            // ── Helpers ──
            function openModal(modal) {
                if (!modal) return;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
                const focusable = modal.querySelector('input, select, button:not(.modal-close)');
                if (focusable) setTimeout(() => focusable.focus(), 100);
            }

            function closeModal(modal) {
                if (!modal) return;
                modal.classList.remove('active');
                document.body.style.overflow = '';
                if (modal === enrollModal) enrollBtn.focus();
                else if (modal === loginModal) loginBtn.focus();
            }

            function closeAllModals() {
                closeModal(enrollModal);
                closeModal(loginModal);
            }

            // ── Open triggers ──
            enrollBtn.addEventListener('click', function(e) {
                e.preventDefault();
                closeModal(loginModal);
                openModal(enrollModal);
            });

            loginBtn.addEventListener('click', function(e) {
                e.preventDefault();
                closeModal(enrollModal);
                openModal(loginModal);
            });

            // ── Close triggers ──
            enrollClose.addEventListener('click', function() { closeModal(enrollModal); });
            loginClose.addEventListener('click', function() { closeModal(loginModal); });

            // click outside modal content → close
            enrollModal.addEventListener('click', function(e) {
                if (e.target === enrollModal) closeModal(enrollModal);
            });
            loginModal.addEventListener('click', function(e) {
                if (e.target === loginModal) closeModal(loginModal);
            });

            // ── Keyboard: ESC ──
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (enrollModal.classList.contains('active')) closeModal(enrollModal);
                    if (loginModal.classList.contains('active')) closeModal(loginModal);
                }
            });

            // ── Password toggle ──
            passwordToggle.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                const icon = passwordToggle.querySelector('i');
                if (icon) {
                    icon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
                }
            });

            // ── Enroll form ──
            enrollForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const select = document.getElementById('programSelect');
                if (!select.value) {
                    select.focus();
                    select.style.borderColor = '#ff6b6b';
                    setTimeout(() => select.style.borderColor = '', 1200);
                    return;
                }
                alert('✅ Enrollment submitted!\n\nProgramme: ' + select.value +
                    '\n\nWe\'ll contact you shortly with next steps.');
                closeModal(enrollModal);
                enrollForm.reset();
            });

            // ── Login form ──
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const password = passwordInput.value.trim();
                if (!username || !password) {
                    if (!username) document.getElementById('username').focus();
                    else passwordInput.focus();
                    return;
                }
                alert('🔓 Welcome back, ' + username + '!\n\n(Simulated login — you\'re in.)');
                closeModal(loginModal);
                loginForm.reset();
                passwordInput.type = 'password';
                const icon = passwordToggle.querySelector('i');
                if (icon) icon.className = 'fas fa-eye';
            });

            // ── Forgot password / Support ──
            forgotLink.addEventListener('click', function(e) {
                e.preventDefault();
                alert('📧 A password reset link has been sent to your registered email.\n(Simulated)');
            });

            supportLink.addEventListener('click', function(e) {
                e.preventDefault();
                alert('📞 Support: +260 97 123 4567\n✉️ support@northerntech.edu.zm\n(Simulated)');
            });

            // ── Passive touch ──
            document.querySelectorAll('button, .btn, .modal-close, .password-toggle')
                .forEach(el => {
                    el.addEventListener('touchend', function(e) {
                        // passive
                    }, { passive: true });
                });

            // ── Preload background ──
            const bg = new Image();
            bg.src = 'home.webp';
            bg.onerror = function() {
                console.warn('home.webp not found, using fallback dark background.');
            };

            console.log('✅ Northern Technical College — Welcome Page (compact) ready.');
        })();
    </script>

</body>
</html>
